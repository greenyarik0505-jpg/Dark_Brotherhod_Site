name: Build and Deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Inject Admin Password from GitHub Secrets 🔐
        run: |
          sed -i '/config.js/d' .gitignore
          echo "window.BRAWL_CLUB_CONFIG = { adminPassword: '${{ secrets.ADMIN_PASSWORD }}' };" > config.js

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages # Будет деплоиться в ветку gh-pages для авто-публикации на GitHub Pages




